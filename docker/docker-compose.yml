# ============================================================
# Gemma 4 Agentic RAG — 统一基础设施编排
#
# 包含以下服务：
#   - Milvus (etcd + minio + standalone + attu): 向量数据库
#   - SearXNG: 本地无追踪联网搜索
#
# 启动所有服务：
#   docker compose -f docker/docker-compose.yml up -d
#
# 单独启动某个服务（如仅启动 Milvus）：
#   docker compose -f docker/docker-compose.yml up -d etcd minio standalone attu
#
# 单独启动 SearXNG：
#   docker compose -f docker/docker-compose.yml up -d searxng
# ============================================================

services:

  # ----------------------------------------------------------
  # Milvus 向量数据库 (etcd + minio + standalone + attu)
  # ----------------------------------------------------------
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.1
    command: [ "milvus", "run", "standalone" ]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530" # 代码里连接用的端口
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # Attu 可视化数据库管理面板
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.4.1
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8080:3000" # 浏览器访问端口
    depends_on:
      - "standalone"

  # ----------------------------------------------------------
  # SearXNG 本地无追踪搜索引擎
  # ----------------------------------------------------------
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    ports:
      - "8081:8080" # 左边是宿主机端口（8081），右边是容器内端口
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/ # URL 端口必须和上面的宿主机端口保持一致
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
