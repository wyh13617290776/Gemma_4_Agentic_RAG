# config/llm_tasks.yaml

# =========================================================
# 1. LLM 对话任务：系列默认模板
# =========================================================

# A类 Google：本地 Gemma 系列
llm_chat_gemma:
  temperature: 1.0
  top_p: 0.95
  max_tokens: 4096
  extra_body:
    top_k: 64

# B类 阿里云：千问系列
llm_chat_qwen:
  temperature: 0.85
  top_p: 0.8
  max_tokens: 4096
  extra_body:
    top_k: 50

# C类 深度求索：DeepSeek 系列
llm_chat_deepseek:
  temperature: 0.6
  top_p: 0.9
  max_tokens: 4096
  extra_body:
    top_k: 20


# =========================================================
# 2. 系统内部其他任务默认配置
# =========================================================

# 意图路由分发
intent_routing:
  temperature: 0.1
  top_p: 0.1
  max_tokens: 512
  extra_body:
    top_k: 1

# RAG 查询转换与扩充
query_transformation:
  temperature: 0.6
  top_p: 0.8
  max_tokens: 1024
  extra_body:
    top_k: 40

# 后台记忆上下文压缩
memory_summary:
  temperature: 0.1
  top_p: 0.1
  max_tokens: 2048
  extra_body:
    top_k: 1