# config/model_router.yaml

default_model: "gemma-4-local"

models:
  # =========================================================
  # Google：本地 Gemma 4
  # =========================================================
  gemma-4-local:
    type: "gemma"
    protocol: "openai"
    base_url: "http://127.0.0.1:8000/v1"
    adapter: "local_think"
    # 本地模型的物理启动参数
    server_info:
      model_path: models/gemma-4-E4B-it-Q4_K_M.gguf
      mmproj_path: models/mmproj-F16.gguf
      n_gpu_layers: '22'
      n_ctx: '18000'
      n_threads: '16'
      host: 127.0.0.1
      port: '8000'
    # 该模型的特性开关
    features:
      enable_thinking: true
      enable_multimodal: true
      media_limits:
        max_audio_sec: 30
        max_video_sec: 60
    generation_cfg:
      temperature: 1.0
      top_p: 0.95
      max_tokens: 4096
      top_k: 64

  # ---------------------------------------------------------
  # 1. 硅基流动 - DeepSeek 家族 (云端主力，针对 V3/R1 优化)
  # ---------------------------------------------------------
  # DeepSeek V3 (核心通用对话与工具调用主力)
  deepseek-ai/DeepSeek-V3:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "standard"
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20

  # DeepSeek V3.2 (双擎版：既能做日常对话，也能开启深度思考)
  deepseek-ai/DeepSeek-V3.2:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "deepseek"
    dynamic_thinking: true
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20

  # DeepSeek R1 (深度思考满血版，专攻复杂推理)
  deepseek-ai/DeepSeek-R1:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "deepseek"
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20
  
  # ---------------------------------------------------------
  # 2. 阿里云 - 千问家族 (侧重平衡，适配官方推荐采样)
  # ---------------------------------------------------------
  # Qwen3 旗舰增强 (标准无思考)
  qwen3.6-plus:
    type: "qwen" # 指向 llm_chat_qwen 模板
    protocol: "openai"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    key_env: "DASHSCOPE_API_KEY"
    adapter: "standard"
    generation_cfg:
      temperature: 0.85
      top_p: 0.8
      max_tokens: 4096
      top_k: 50
  
  # 视觉推理之王 (支持思考展示)
  qvq-max-2025-03-25:
    type: "qwen"
    protocol: "openai"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    key_env: "DASHSCOPE_API_KEY"
    adapter: "deepseek"
    dynamic_thinking: true
    generation_cfg:
      temperature: 0.85
      top_p: 0.8
      max_tokens: 4096
      top_k: 50
  
  # 千问标准多模态
  qwen-vl-plus:
    type: "qwen"
    protocol: "openai"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    key_env: "DASHSCOPE_API_KEY"
    adapter: "standard"
    generation_cfg:
      temperature: 0.85
      top_p: 0.8
      max_tokens: 4096
      top_k: 50