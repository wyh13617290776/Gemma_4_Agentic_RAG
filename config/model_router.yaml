# config/model_router.yaml

default_model: "gemma-4-local"

models:
  # =========================================================
  # Google：本地 Gemma 4 (推理与 RAG 基础)
  # =========================================================
  gemma-4-local:
    type: "gemma"
    protocol: "openai"
    base_url: "http://127.0.0.1:8000/v1"
    adapter: "local_think"
    server_info:
      model_path: models/gemma-4-E4B-it-Q4_K_M.gguf
      mmproj_path: models/mmproj-F16.gguf
      n_gpu_layers: '22'
      n_ctx: '18000'
      n_threads: '16'
      host: 127.0.0.1
      port: '8000'
    features:
      enable_thinking: true
      enable_multimodal: true
      media_limits:
        max_audio_sec: 30
        max_video_sec: 60
    generation_cfg:
      temperature: 1.0
      top_p: 0.95
      max_tokens: 4096
      top_k: 64

  # ---------------------------------------------------------
  # 1. 硅基流动 - DeepSeek 家族
  # ---------------------------------------------------------
  deepseek-ai/DeepSeek-V3:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "standard"
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20

  deepseek-ai/DeepSeek-V3.2:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "deepseek"
    dynamic_thinking: true
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20

  deepseek-ai/DeepSeek-R1:
    type: "deepseek"
    protocol: "openai"
    base_url: "https://api.siliconflow.cn/v1"
    key_env: "SILICONFLOW_API_KEY"
    adapter: "deepseek"
    generation_cfg:
      temperature: 0.6
      top_p: 0.9
      max_tokens: 4096
      top_k: 20
  
